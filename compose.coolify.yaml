services:
  postgres:
    build:
      context: .
      dockerfile: apps/server/infra/postgres/Dockerfile.pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - mebike-postgres-data:/var/lib/postgresql
      - ./apps/server/infra/postgres/init-extensions.sql:/docker-entrypoint-initdb.d/10_extensions.sql:ro
    networks:
      - mebike-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8.4-bookworm
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - mebike-redis-data:/data
    networks:
      - mebike-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    environment:
      IOT_MQTT_USERNAME: ${IOT_MQTT_USERNAME}
      IOT_MQTT_PASSWORD: ${IOT_MQTT_PASSWORD}
    command:
      - sh
      - -c
      - |
        if [ -z "$${IOT_MQTT_USERNAME:-}" ] || [ -z "$${IOT_MQTT_PASSWORD:-}" ]; then
          echo "IOT_MQTT_USERNAME and IOT_MQTT_PASSWORD are required" >&2
          exit 1
        fi
        printf '%s\n' \
          'listener 1883 0.0.0.0' \
          'allow_anonymous false' \
          'password_file /mosquitto/config/passwords' \
          'persistence true' \
          'persistence_location /mosquitto/data/' \
          'log_dest stdout' \
          > /mosquitto/config/mosquitto.conf
        rm -f /mosquitto/config/passwords
        mosquitto_passwd -b -c /mosquitto/config/passwords "$${IOT_MQTT_USERNAME}" "$${IOT_MQTT_PASSWORD}"
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
    volumes:
      - mebike-mosquitto-data:/mosquitto/data
    networks:
      - mebike-internal

  frontend:
    image: ${COMPOSE_PROJECT_NAME:-mebike}-frontend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_TOMTOM_API_KEY: ${NEXT_PUBLIC_TOMTOM_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"

  server:
    image: ${COMPOSE_PROJECT_NAME:-mebike}-server:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      IOT_MQTT_URL: mqtt://mosquitto:1883
      IOT_MQTT_USERNAME: ${IOT_MQTT_USERNAME}
      IOT_MQTT_PASSWORD: ${IOT_MQTT_PASSWORD}
    depends_on:
      server-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mebike-internal
    expose:
      - "4000"

  worker:
    image: ${COMPOSE_PROJECT_NAME:-mebike}-server:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    depends_on:
      server-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mebike-internal
    command: ["node", "apps/server/dist/src/worker/index.js"]

  worker_iot:
    image: ${COMPOSE_PROJECT_NAME:-mebike}-server:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      IOT_MQTT_URL: mqtt://mosquitto:1883
      IOT_MQTT_USERNAME: ${IOT_MQTT_USERNAME}
      IOT_MQTT_PASSWORD: ${IOT_MQTT_PASSWORD}
    depends_on:
      server-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - mebike-internal
    command: ["node", "apps/server/dist/src/worker/iot/index.js"]

  server-migrate:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: builder
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mebike-internal
    command: ["pnpm", "--filter", "server", "exec", "prisma", "migrate", "deploy"]

networks:
  mebike-internal:
    driver: bridge

volumes:
  mebike-postgres-data:
  mebike-redis-data:
  mebike-mosquitto-data:
